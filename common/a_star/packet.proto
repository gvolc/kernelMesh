syntax = "proto3";

package packet;

option go_package = "./packet";

enum PacketType {
  UNKNOWN = 0;
  PING_REQUEST = 1;
  PING_RESPONSE = 2;
}

message MeshPing {
  PacketType type = 1;
  uint32 seq = 2;
  bytes client_id = 3;
  
  uint32 battery = 4;
  float cpu_usage = 5;
  uint32 received_by_target = 6;
}